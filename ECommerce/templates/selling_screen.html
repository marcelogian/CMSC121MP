{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
body {
    background-color: #fdf6e3; /* parchment-like */
    color: #111; /* dark text for contrast */
    font-family: 'Cinzel', serif;
    margin: 0;
    padding: 0;
}

/* Fantasy-styled form container */
.form-container {
    background: linear-gradient(145deg, #fefae0, #f7f0c3); /* parchment gradient */
    padding: 2rem;
    border-radius: 10px;
    border: 2px solid #d4af37; /* gold border */
    box-shadow: 0 0 12px rgba(212, 175, 55, 0.3); /* soft gold glow */
    margin-top: 2rem;
    font-family: 'Cinzel', serif;
}

/* Fantasy-styled buttons on the right */
.right-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 1rem;
}

.right-buttons button {
    background-color: transparent;
    color: #d4af37;
    border: 2px solid #d4af37;
    border-radius: 5px;
    padding: 0.75rem 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(212, 175, 55, 0.2);
    transition: all 0.3s ease;
}

.right-buttons button:hover {
    background-color: rgba(212, 175, 55, 0.1);
    color: white;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
}
.form-container input,
.form-container textarea,
.form-container select {
    width: 100%;
    padding: 10px;
    margin-top: 0.5rem;
    border: 1px solid #d4af37;
    border-radius: 5px;
    font-family: 'Cinzel', serif;
    background-color: #fffef4;
    color: #333;
}

    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <!-- Left form panel -->
            <div class="col-md-9">
                <div class="form-container">
                    <h4>Add a New Product</h4>
                    <form method="POST" enctype="multipart/form-data" id="form-id">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_name" class="form-label fw-bold">Name <span class="text-danger">*</span></label><br>
                            {{ form.name }}
                        </div>
                        <div class="mb-3">
                            <label for="id_description" class="form-label fw-bold">Description <span class="text-danger">*</span></label><br>
                            {{ form.description }}
                        </div>
                        <div class="mb-3">
                            <label for="id_price" class="form-label fw-bold">Price <span class="text-danger">*</span></label><br>
                            {{ form.price }}
                        </div>
                        <div class="mb-3">
                            <label for="id_stock" class="form-label fw-bold">Stock <span class="text-danger">*</span></label><br>
                            {{ form.stock }}
                        </div>
                        <div class="mb-3">
                            <label for="id_image" class="form-label fw-bold">Image</label><br>
                            {{ form.image }}
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right save buttons -->
            <div class="col-md-3">
                <div class="right-buttons">
                    <button type="submit" form="form-id" name="_addanother" class="btngreen">Save and Add Another</button>
                    <a href="{% url 'shop' %}" class="btn">Go to Shop</a>
                    <a href="{% url 'account' %}" class="btn">Back to your Account</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
